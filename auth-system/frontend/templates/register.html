<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="auth-card">
        <h1 class="h3 fw-bold mb-2">Register</h1>
        <p class="text-muted mb-4">Create a new account with a hashed password on the server.</p>

        <div class="alert alert-danger" ng-if="register.error">{{ register.error }}</div>
        <div class="alert alert-success" ng-if="register.success">{{ register.success }}</div>

        <form name="registerForm" ng-submit="register.submit(registerForm)" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input
              id="name"
              name="name"
              class="form-control"
              ng-class="{ 'is-invalid': registerForm.name.$touched && registerForm.name.$invalid }"
              type="text"
              ng-model="register.user.name"
              required
              minlength="2"
            >
            <div class="invalid-feedback">Name must be at least 2 characters.</div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              id="email"
              name="email"
              class="form-control"
              ng-class="{ 'is-invalid': registerForm.email.$touched && registerForm.email.$invalid }"
              type="email"
              ng-model="register.user.email"
              required
            >
            <div class="invalid-feedback">Enter a valid email.</div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              id="password"
              name="password"
              class="form-control"
              ng-class="{ 'is-invalid': registerForm.password.$touched && registerForm.password.$invalid }"
              type="password"
              ng-model="register.user.password"
              required
              minlength="6"
            >
            <div class="invalid-feedback">Password must be at least 6 characters.</div>
          </div>

          <button class="btn btn-primary w-100" type="submit" ng-disabled="register.loading">
            {{ register.loading ? 'Creating account...' : 'Register' }}
          </button>
        </form>

        <p class="mt-3 mb-0 small text-center">
          Already have an account? <a href="#!/login">Login</a>
        </p>
      </div>
    </div>
  </div>
</section>
