<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="auth-card">
        <h1 class="h3 fw-bold mb-2">Login</h1>
        <p class="text-muted mb-4">Use the demo account or your registered account.</p>

        <div class="alert alert-danger" ng-if="login.error">{{ login.error }}</div>

        <form name="loginForm" ng-submit="login.submit(loginForm)" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              id="email"
              name="email"
              class="form-control"
              ng-class="{ 'is-invalid': loginForm.email.$touched && loginForm.email.$invalid }"
              type="email"
              ng-model="login.credentials.email"
              required
            >
            <div class="invalid-feedback">Enter a valid email.</div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              id="password"
              name="password"
              class="form-control"
              ng-class="{ 'is-invalid': loginForm.password.$touched && loginForm.password.$invalid }"
              type="password"
              ng-model="login.credentials.password"
              required
            >
            <div class="invalid-feedback">Password is required.</div>
          </div>

          <button class="btn btn-primary w-100" type="submit" ng-disabled="login.loading">
            {{ login.loading ? 'Signing in...' : 'Login' }}
          </button>
        </form>

        <p class="mt-3 mb-0 small text-center">
          No account? <a href="#!/register">Create one</a>
        </p>
      </div>
    </div>
  </div>
</section>
