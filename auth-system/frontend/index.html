<!doctype html>
<html lang="en" ng-app="authApp">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AngularJS JWT Auth</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body ng-controller="NavController as nav">
    <nav class="app-topbar">
      <div class="topbar-inner">
        <a class="brand-link" href="#!/dashboard">My Secure App</a>
        <button
          class="navbar-toggler d-lg-none"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
          aria-controls="navbarContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="topbar-actions">
            <li ng-if="!nav.isLoggedIn()">
              <a class="topbar-link" href="#!/login">Login</a>
            </li>
            <li ng-if="!nav.isLoggedIn()">
              <a class="topbar-link" href="#!/register">Register</a>
            </li>
            <li class="hello-user" ng-if="nav.isLoggedIn()">
              Hello, {{ nav.currentUser().name || 'User' }}
            </li>
            <li ng-if="nav.isLoggedIn()">
              <span class="status-pill">online</span>
            </li>
            <li ng-if="nav.isLoggedIn()">
              <button class="logout-button" type="button" ng-click="nav.logout()">Logout</button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="page-shell">
      <div ng-view></div>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app/app.js"></script>
    <script src="app/services/auth.service.js"></script>
    <script src="app/services/auth.interceptor.js"></script>
    <script src="app/routes.js"></script>
    <script src="app/controllers/nav.controller.js"></script>
    <script src="app/controllers/login.controller.js"></script>
    <script src="app/controllers/register.controller.js"></script>
    <script src="app/controllers/dashboard.controller.js"></script>
  </body>
</html>
