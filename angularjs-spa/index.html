<!doctype html>
<html lang="en" ng-app="campusSpa">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AngularJS Campus SPA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body ng-controller="MainController as main">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="#!/">Campus SPA</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" ng-class="{ active: main.isActive('/') }" href="#!/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" ng-class="{ active: main.isActive('/about') }" href="#!/about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" ng-class="{ active: main.isActive('/contact') }" href="#!/contact">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="page-shell">
      <div ng-view></div>
    </main>

    <footer class="border-top py-4">
      <div class="container text-center text-muted small">
        AngularJS single page app with routing, data binding, validation, and Bootstrap.
      </div>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app/app.js"></script>
    <script src="app/routes.js"></script>
    <script src="app/controllers.js"></script>
  </body>
</html>
